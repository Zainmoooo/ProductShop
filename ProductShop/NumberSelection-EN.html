<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Choose your number – Zain Kuwait</title>
  <style>
    /* Nunito Sans – self-hosted (variable font, covers wght 400–900) */
    @font-face { font-family:'Nunito Sans'; font-style:normal; font-weight:400 900; font-display:swap; src:url('assets/fonts/nunito-cyrillic-ext.woff2') format('woff2'); unicode-range:U+0460-052F,U+1C80-1C8A,U+20B4,U+2DE0-2DFF,U+A640-A69F,U+FE2E-FE2F; }
    @font-face { font-family:'Nunito Sans'; font-style:normal; font-weight:400 900; font-display:swap; src:url('assets/fonts/nunito-cyrillic.woff2') format('woff2'); unicode-range:U+0301,U+0400-045F,U+0490-0491,U+04B0-04B1,U+2116; }
    @font-face { font-family:'Nunito Sans'; font-style:normal; font-weight:400 900; font-display:swap; src:url('assets/fonts/nunito-vietnamese.woff2') format('woff2'); unicode-range:U+0102-0103,U+0110-0111,U+0128-0129,U+0168-0169,U+01A0-01A1,U+01AF-01B0,U+0300-0301,U+0303-0304,U+0308-0309,U+0323,U+0329,U+1EA0-1EF9,U+20AB; }
    @font-face { font-family:'Nunito Sans'; font-style:normal; font-weight:400 900; font-display:swap; src:url('assets/fonts/nunito-latin-ext.woff2') format('woff2'); unicode-range:U+0100-02BA,U+02BD-02C5,U+02C7-02CC,U+02CE-02D7,U+02DD-02FF,U+0304,U+0308,U+0329,U+1D00-1DBF,U+1E00-1E9F,U+1EF2-1EFF,U+2020,U+20A0-20AB,U+20AD-20C0,U+2113,U+2C60-2C7F,U+A720-A7FF; }
    @font-face { font-family:'Nunito Sans'; font-style:normal; font-weight:400 900; font-display:swap; src:url('assets/fonts/nunito-latin.woff2') format('woff2'); unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD; }
  </style>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #e5e5e5;
      display: flex;
      justify-content: center;
      font-family: 'Nunito Sans', sans-serif;
      min-height: 100vh;
    }

    .phone {
      width: 393px;
      max-width: 100vw;
      background: #fff;
      min-height: 100vh;
      position: relative;
      padding-bottom: 113px;
    }

    /* ── Status bar ── */
    .status-bar {
      height: 57px;
      background: #fff;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 0 11px 8px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .status-time {
      font-family: 'SF Pro Text', 'Nunito Sans', sans-serif;
      font-size: 16px;
      font-weight: 600;
      color: #000;
      letter-spacing: -0.32px;
      width: 54px;
    }
    .dynamic-island {
      width: 125px;
      height: 37px;
      background: #171717;
      border-radius: 100px;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: 10px;
    }
    .status-icons { display: flex; gap: 8px; align-items: center; }
    .status-icons img { display: block; }

    /* ── Nav bar ── */
    .nav-bar {
      height: 62px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 6px;
      position: sticky;
      top: 57px;
      z-index: 99;
      border-bottom: 1px solid #f0f0f0;
    }
    .nav-back {
      width: 40px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .nav-title {
      font-size: 16px;
      font-weight: 700;
      color: #262626;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
    }
    .nav-close {
      height: 42px;
      padding: 0 8px;
      display: flex;
      align-items: center;
      font-size: 16px;
      font-weight: 400;
      color: #171717;
      cursor: pointer;
    }

    /* ── Page content ── */
    .page-content {
      padding: 16px 16px 24px;
    }

    /* ── Search field ── */
    .search-field {
      background: #fff;
      border: 1px solid #d4d4d4;
      border-radius: 8px;
      height: 48px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      margin-bottom: 20px;
    }
    .search-field svg { flex-shrink: 0; color: #a3a3a3; }
    .search-field input {
      flex: 1;
      border: none;
      outline: none;
      font-family: 'Nunito Sans', sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: #171717;
      background: transparent;
    }
    .search-field input::placeholder { color: #a3a3a3; }

    /* ── Numbers grid ── */
    .numbers-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 20px;
    }
    .number-card {
      background: rgba(252,253,254,0.9);
      border: 1.5px solid #d4d4d4;
      border-radius: 8px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 600;
      color: #262626;
      cursor: pointer;
      position: relative;
      transition: border-color 0.18s, background 0.18s, box-shadow 0.18s;
      user-select: none;
    }
    .number-card:active:not(.locked) { transform: scale(0.97); }
    .number-card.selected {
      border-color: #00a6b6;
      background: #f0fbfc;
      box-shadow: 0 0 0 2px rgba(0,166,182,0.18);
    }
    .number-card.locked {
      border-color: #ca8a04;
      cursor: default;
      opacity: 0.7;
    }
    .lock-badge {
      position: absolute;
      top: -9px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff;
      padding: 0 2px;
    }
    .lock-badge svg { display: block; }
    .number-card.selected .check-badge-num { opacity: 1; }
    .check-badge-num {
      width: 18px;
      height: 18px;
      background: #00a6b6;
      border-radius: 50%;
      position: absolute;
      top: 5px;
      right: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.18s;
    }
    .check-badge-num svg { width: 10px; height: 10px; }

    /* ── Shuffle ── */
    .shuffle-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 14px;
      font-weight: 700;
      color: #d12b8a;
      text-decoration: underline;
      cursor: pointer;
      padding: 12px 0;
    }

    /* ── Bottom bar (fixed) ── */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 393px;
      max-width: 100vw;
      background: #fff;
      border-top: 1px solid #e5e5e5;
      height: 92px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 200;
    }
    .bottom-bar-price { display: flex; flex-direction: column; gap: 2px; }
    .bottom-price-label { font-size: 14px; font-weight: 600; color: #a3a3a3; }
    .bottom-price-line { display: flex; align-items: baseline; gap: 3px; }
    .bottom-price-amount { font-size: 18px; font-weight: 800; color: #171717; }
    .bottom-price-suffix { font-size: 14px; font-weight: 700; color: #262626; }
    .continue-btn {
      background: #e5e5e5;
      color: #a3a3a3;
      border: none;
      border-radius: 8px;
      width: 164px;
      height: 43px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Nunito Sans', sans-serif;
      cursor: not-allowed;
      transition: background 0.25s, color 0.25s;
    }
    .continue-btn.ready {
      background: #171717;
      color: #fff;
      cursor: pointer;
    }
    .continue-btn.ready:active { background: #333; }

    /* ── No results ── */
    .no-results {
      text-align: center;
      padding: 32px 0;
      font-size: 14px;
      color: #a3a3a3;
      font-weight: 600;
      display: none;
    }
  </style>
</head>
<body>
<div class="phone">

  <!-- STATUS BAR -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="dynamic-island"></div>
    <div class="status-icons">
      <img src="assets/ba3a1f26-d126-4df1-9e8a-ec576b7b2d4a.svg" width="18" height="12" alt="">
      <img src="assets/e8f4e0e0-794e-4c11-b8e3-3bf99a990af6.svg" width="17" height="12" alt="">
      <img src="assets/e37b768d-fdd9-4885-a290-b597bd9d4e23.svg" width="27" height="13" alt="">
    </div>
  </div>

  <!-- NAV BAR -->
  <div class="nav-bar">
    <div class="nav-back" onclick="history.back()">
      <img src="assets/9ec1307e-d26f-497f-ad4b-0e80b34c18ad.svg" width="24" height="24" alt="Back">
    </div>
    <div class="nav-title">Choose your number</div>
    <div class="nav-close" onclick="history.back()">Close</div>
  </div>

  <!-- PAGE CONTENT -->
  <div class="page-content">

    <!-- Search -->
	  <h2>Choose your phone number</h2>
	  <p style="color: gray; margin-bottom: 1rem;">Pick from available numbers below.</p>
    <div class="search-field">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <circle cx="7" cy="7" r="5" stroke="#a3a3a3" stroke-width="1.5"/>
        <path d="M10.5 10.5L14 14" stroke="#a3a3a3" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search preferred number combinations" oninput="filterNumbers()">
    </div>

    <!-- Numbers grid -->
    <div class="numbers-grid" id="numbersGrid"></div>
    <div class="no-results" id="noResults">No numbers match your search</div>

    <!-- Shuffle -->
    <div class="shuffle-link" onclick="shuffleNumbers()">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
        <path d="M2 7.5A5.5 5.5 0 0112.5 4M13 4V1M13 4H10M13 7.5A5.5 5.5 0 012.5 11M2 11V14M2 11H5" stroke="#000000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span style="color: black">Shuffle numbers</span>
    </div>

  </div>
</div>

<!-- BOTTOM BAR (fixed) -->
<div class="bottom-bar">
  <div class="bottom-bar-price">
    <span class="bottom-price-label">Total monthly price</span>
    <div class="bottom-price-line">
      <span class="bottom-price-amount" id="priceAmount">KD 0</span>
      <span class="bottom-price-suffix" id="priceSuffix">/mo.</span>
    </div>
  </div>
  <button class="continue-btn" id="continueBtn" onclick="onContinue()">Continue</button>
</div>

<script>
  // ─── Read price from previous page ───────────────────────
  const savedPrice = sessionStorage.getItem('zain_order_price') || '';
  if (savedPrice) {
    // Format: "KD 28/mo." or "KD 534"
    const hasMo = savedPrice.includes('/mo.');
    const numPart = savedPrice.replace('/mo.','').trim();
    document.getElementById('priceAmount').textContent = numPart;
    document.getElementById('priceSuffix').textContent = hasMo ? '/mo.' : '';
  }

  // ─── Number pools ─────────────────────────────────────────
  const prefixes = ['92','90','91','97','99','96','55','50','66','94'];

  function randNum() {
    const p = prefixes[Math.floor(Math.random() * prefixes.length)];
    return p + String(Math.floor(Math.random() * 9000000) + 1000000);
  }

  // Fixed premium (locked) numbers
  const lockedNumbers = ['92208431','90901234','99871023'];

  let regularNumbers = [];
  let selectedNumber = null;

  function generateNumbers() {
    const pool = new Set();
    while (pool.size < 15) pool.add(randNum());
    regularNumbers = Array.from(pool);
  }

  function renderGrid(filter = '') {
    const grid = document.getElementById('numbersGrid');
    const noRes = document.getElementById('noResults');

    const filtered = filter
      ? regularNumbers.filter(n => n.includes(filter))
      : regularNumbers;

    const lockedFiltered = filter
      ? lockedNumbers.filter(n => n.includes(filter))
      : lockedNumbers;

    const total = filtered.length + lockedFiltered.length;
    grid.innerHTML = '';
    noRes.style.display = total === 0 ? 'block' : 'none';

    filtered.forEach(num => {
      const card = document.createElement('div');
      card.className = 'number-card' + (num === selectedNumber ? ' selected' : '');
      card.dataset.num = num;
      card.innerHTML = `
        <div class="check-badge-num"><svg viewBox="0 0 11 9" fill="none"><path d="M1 4.5L4 7.5L10 1.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        ${num}
      `;
      card.addEventListener('click', () => selectNumber(card, num));
      grid.appendChild(card);
    });

    lockedFiltered.forEach(num => {
      const card = document.createElement('div');
      card.className = 'number-card locked';
      card.innerHTML = `
        <div class="lock-badge">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="3" y="7.5" width="10" height="7.5" rx="1.5" fill="#ca8a04"/>
            <path d="M5.5 7.5V5a2.5 2.5 0 015 0v2.5" stroke="#ca8a04" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </div>
        ${num}
      `;
      grid.appendChild(card);
    });
  }

  function selectNumber(card, num) {
    selectedNumber = num;
    document.querySelectorAll('.number-card:not(.locked)').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    document.getElementById('continueBtn').classList.add('ready');
  }

  function filterNumbers() {
    const q = document.getElementById('searchInput').value.trim();
    renderGrid(q);
  }

  function shuffleNumbers() {
    selectedNumber = null;
    document.getElementById('continueBtn').classList.remove('ready');
    document.getElementById('searchInput').value = '';
    generateNumbers();
    renderGrid();
  }

  function onContinue() {
    const btn = document.getElementById('continueBtn');
    if (!btn.classList.contains('ready')) return;
    btn.textContent = '✓ Order placed!';
    btn.style.background = '#1a7a42';
    setTimeout(() => {
      btn.textContent = 'Continue';
      btn.style.background = '';
    }, 2500);
  }

  // ─── Init ─────────────────────────────────────────────────
  generateNumbers();
  renderGrid();
</script>
</body>
</html>
